<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http:;" />
  <title>New Tab</title>
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="pages.css" />
</head>
<body class="ledger-body">
  <main class="ledger">
    <div id="dateLine" class="ledger-date"></div>
    <h1 class="ledger-heading">Where to?</h1>

    <section class="ledger-section">
      <a class="ledger-label" href="blanc://bookmarks/">favorites</a>
      <div id="favoritesList" class="ledger-list"></div>
    </section>

    <section id="groupsSection" class="ledger-section" hidden>
      <div class="ledger-label">pick up where you left off</div>
      <div id="groupsList" class="ledger-list ledger-groups"></div>
    </section>

    <section id="remoteSection" class="ledger-section" hidden>
      <div class="ledger-label">on your other devices</div>
      <div id="remoteList" class="ledger-list"></div>
    </section>
  </main>

  <footer class="ledger-footer">
    <span id="footerLeft"></span>
    <span id="version" class="ledger-version"></span>
    <span id="goAnywhere"></span>
  </footer>

  <script src="newtab.js"></script>
</body>
</html>
