<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http: blanc:;" />
  <title>Blanc Overlay</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="overlay-body">
  <div id="backdrop" hidden></div>
  <div id="panelAnchor" hidden>
    <div id="islandPanel">
      <div class="panel-row">
        <span id="panelInsecure" class="insecure-badge" title="Not secure — this site uses an unencrypted connection (HTTP)" hidden>
          <svg viewBox="0 0 16 16"><rect x="3.25" y="7.25" width="9.5" height="6" rx="1.75"/><path d="M5.5 7.25V4.9a2.6 2.6 0 0 1 5.1-.72"/></svg>
        </span>
        <input id="addressInput" spellcheck="false" autocomplete="off" placeholder="Search, enter address, or / for commands" />
        <div class="panel-actions">
          <button id="backBtn" class="act-btn" title="Back" disabled>
            <svg viewBox="0 0 16 16"><path d="M9.75 3.5 5.25 8l4.5 4.5"/></svg>
          </button>
          <button id="fwdBtn" class="act-btn" title="Forward" disabled>
            <svg viewBox="0 0 16 16"><path d="M6.25 3.5 10.75 8l-4.5 4.5"/></svg>
          </button>
          <button id="reloadBtn" class="act-btn" title="Reload"></button>
          <button id="heartBtn" class="act-btn" title="Favorite this page (Ctrl/Cmd+D)">
            <svg viewBox="0 0 16 16"><path d="M8 13.25C4.6 11 2.75 8.9 2.75 6.6a2.85 2.85 0 0 1 5.25-1.54A2.85 2.85 0 0 1 13.25 6.6c0 2.3-1.85 4.4-5.25 6.65z"/></svg>
          </button>
          <button id="dismissBtn" class="act-btn" title="Dismiss (Esc)">
            <svg viewBox="0 0 16 16"><path d="M4.75 4.75l6.5 6.5M11.25 4.75l-6.5 6.5"/></svg>
          </button>
        </div>
      </div>
      <div id="islandList"></div>
      <div id="islandFooter">
        <button id="footerNewTab" class="footer-new">
          <svg viewBox="0 0 16 16"><path d="M8 3.25v9.5M3.25 8h9.5"/></svg>
          <span>new tab</span>
          <span id="footerNewTabKbd" class="footer-kbd"></span>
        </button>
        <button id="footerNewPrivate" class="footer-new private">
          <svg viewBox="0 0 16 16"><path d="M8 3.25v9.5M3.25 8h9.5"/></svg>
          <span>private</span>
          <span id="footerNewPrivateKbd" class="footer-kbd"></span>
        </button>
        <span class="footer-spacer"></span>
        <button id="footerFavorites" class="footer-act" title="Favorites">
          <svg viewBox="0 0 16 16"><path d="M8 13.25C4.6 11 2.75 8.9 2.75 6.6a2.85 2.85 0 0 1 5.25-1.54A2.85 2.85 0 0 1 13.25 6.6c0 2.3-1.85 4.4-5.25 6.65z"/></svg>
        </button>
        <button id="footerHistory" class="footer-act" title="History">
          <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.75"/><path d="M8 4.75V8l2.25 1.5"/></svg>
        </button>
        <button id="footerDownloads" class="footer-act" title="Downloads">
          <svg viewBox="0 0 16 16"><path d="M8 2.5v6.5M5.3 6.3 8 9l2.7-2.7M3.5 12.5h9"/></svg>
        </button>
        <button id="footerSettings" class="footer-act" title="Settings">
          <svg viewBox="0 0 16 16"><path d="M2.5 4.75h6M12 4.75h1.5M2.5 11.25h1.5M7.5 11.25h6"/><circle cx="10.25" cy="4.75" r="1.75"/><circle cx="5.75" cy="11.25" r="1.75"/></svg>
        </button>
      </div>
      <div id="islandHint"></div>
    </div>
  </div>
  <div id="findBar" hidden>
    <input id="findInput" spellcheck="false" autocomplete="off" placeholder="Find in page" />
    <div id="findCount"></div>
    <button id="findPrevBtn" class="act-btn" title="Previous match">
      <svg viewBox="0 0 16 16"><path d="M4.5 10.25 8 6.75l3.5 3.5"/></svg>
    </button>
    <button id="findNextBtn" class="act-btn" title="Next match">
      <svg viewBox="0 0 16 16"><path d="M4.5 5.75 8 9.25l3.5-3.5"/></svg>
    </button>
    <button id="findCloseBtn" class="act-btn" title="Close">
      <svg viewBox="0 0 16 16"><path d="M4.75 4.75l6.5 6.5M11.25 4.75l-6.5 6.5"/></svg>
    </button>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
