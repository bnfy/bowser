<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; img-src 'self' data: https: http: blanc:;" />
  <title>Blanc</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="chrome">
    <div id="strip">
      <div id="islandPill" class="no-drag" role="button" tabindex="0" title="Search, tabs & commands (Ctrl/Cmd+L)">
        <div id="pillNav" class="pill-btns"></div>
        <div id="pillDots"></div>
        <span id="pillFavicon" class="favicon"></span>
        <span id="pillInsecure" class="insecure-badge" title="Not secure — this site uses an unencrypted connection (HTTP)" hidden>
          <svg viewBox="0 0 16 16"><rect x="3.25" y="7.25" width="9.5" height="6" rx="1.75"/><path d="M5.5 7.25V4.9a2.6 2.6 0 0 1 5.1-.72"/></svg>
        </span>
        <span id="pillGroupName" hidden></span>
        <span id="pillDomain">new tab</span>
        <button id="pillPrivateChip" title="Leave private mode — closes this tab" hidden>private
          <svg viewBox="0 0 16 16"><path d="M4.75 4.75l6.5 6.5M11.25 4.75l-6.5 6.5"/></svg>
        </button>
        <span id="pillShield" class="shield" hidden>0</span>
        <span class="pill-sep"></span>
        <div id="pillActions" class="pill-btns"></div>
      </div>
      <div id="permissionBar" class="no-drag" hidden>
        <span id="permissionText"></span>
        <button id="permAllowBtn">Allow</button>
        <button id="permBlockBtn">Block</button>
      </div>
      <div id="windowControls" class="no-drag"></div>
    </div>
  </div>
  <aside id="verticalTabsRail" class="vertical-tabs-rail no-drag" aria-label="Vertical tabs" hidden>
    <div class="vertical-tabs-toolbar">
      <span class="vertical-tabs-heading">tabs</span>
      <button
        id="verticalTabsUseIsland"
        class="vertical-tabs-layout-button"
        type="button"
        title="Keep tabs in the Island"
        aria-label="Use Island tab layout"
        data-focus-key="layout:island"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <rect x="1.75" y="4.25" width="12.5" height="7.5" rx="3.75"></rect>
          <circle cx="5.25" cy="8" r="0.75"></circle>
          <circle cx="8" cy="8" r="0.75"></circle>
        </svg>
        <span>Island</span>
      </button>
    </div>
    <div id="verticalTabsList" class="vertical-tabs-list" role="list" aria-label="Open tabs"></div>
    <div class="vertical-tabs-footer">
      <button
        id="verticalTabsNew"
        class="vertical-tabs-new"
        type="button"
        aria-label="New tab"
        data-focus-key="action:new-tab"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3v10M3 8h10"></path></svg>
        <span>New tab</span>
        <kbd id="verticalTabsNewShortcut"></kbd>
      </button>
    </div>
    <div id="verticalTabsAnnouncer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  </aside>
  <script src="vertical-tabs.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
