name: Parity guards

# Enforces the cross-platform parity substrate (see spec/shared-substrate.md):
# the design tokens, settings schema, and copy catalog each have a single source
# of truth (tokens/, settings-schema/, copy/) that the desktop code must not drift
# from, and the shared acceptance scenarios (spec/acceptance/) must stay wired to
# their desktop step definitions. These are read-only checks — no build, no publish.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  substrate:
    # Pure-Node drift guards — the build.mjs checkers use only node builtins, so
    # no dependency install is needed. Fast and hard to break.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: tokens / settings / copy match their sources
        run: |
          node tokens/build.mjs --check
          node settings-schema/build.mjs --check
          node copy/build.mjs --check
      - name: Unit regression tests
        run: npm run test:unit

  acceptance-wiring:
    # The shared Gherkin scenarios must resolve to the desktop step definitions.
    # Dry-run only — no app is launched, so the Electron binary isn't downloaded.
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Acceptance step definitions resolve (dry-run)
        run: npm run test:acceptance:dry

  oauth-compatibility:
    # A deterministic, two-origin OAuth fixture exercises the real Electron
    # popup/tab policies, trusted user activation, opener callback, Chrome
    # identity signals, and FedCM fallback. Cross-platform mapping branches run
    # in the unit job above; live third-party canaries stay opt-in because their
    # UI changes independently of Blanc and would make pull requests flaky.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Google OAuth compatibility contract
        run: xvfb-run -a npm run test:oauth:desktop
