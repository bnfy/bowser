<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Blanc — zero bloat | fast focus</title>
<meta name="description" content="Blanc is a minimal browser built around the Blanc Island: one small control surface for tabs, ad blocking, private tabs, and slash commands. Everything else is the page you came for.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>

<!-- ============ hero: the live island demo IS the hero ============ -->

  <p class="eyebrow">zero bloat <span class="k">|</span> fast focus</p>
  <h1>The browser that gets out of your way.</h1>

  <div class="demo-stage" id="demoStage">
    <div class="demo-page">
      <div class="bar w1"></div>
      <div class="bar w2"></div>
      <div class="bar w3"></div>
      <div class="bar w4"></div>
    </div>
    <img class="demo-shot" id="demoShot" alt="" aria-hidden="true">
    <div class="demo-island" id="demoIsland">
      <div class="pill">
        <div class="dots" id="demoDots"></div>
        <span class="pill-fav" id="demoFav"></span>
        <span class="group-name" id="demoGroupName" hidden></span>
        <span class="domain" id="demoDomain"></span>
        <span class="shield" id="demoShield"></span>
        <span class="priv-chip">private <svg width="8" height="8" viewBox="0 0 12 12"><path d="M3 3 L9 9 M9 3 L3 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
      </div>

      <div class="panel">
        <div class="field"><span class="typed" id="demoTyped"></span><span class="caret"></span></div>
        <div class="list" id="demoList"></div>
        <div class="foot" id="demoFoot">esc to dismiss · ⌘L summons · / for commands</div>
      </div>
    </div>
  </div>

  <p class="demo-caption" id="demoCaption"></p>

  <a class="cta" id="downloadCta" href="https://github.com/bnfy/blanc/releases/latest">download blanc</a>
  <p class="platforms">free · <a id="dl-mac" href="https://github.com/bnfy/blanc/releases/latest">macos</a> · <a id="dl-win" href="https://github.com/bnfy/blanc/releases/latest">windows</a> · <a id="dl-linux" href="https://github.com/bnfy/blanc/releases/latest">linux</a></p>
</header>

<footer>
  <span class="line">zero bloat <b>|</b> fast focus · © 2026 · <a href="https://www.threads.net/@blancbrowser" target="_blank" rel="noopener">Threads</a> · <a href="https://www.instagram.com/blancbrowser/" target="_blank" rel="noopener">Instagram</a></span>
